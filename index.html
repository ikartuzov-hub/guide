<style>
:root{--bg:#1E1016;--bg2:#281720;--bg3:#321E29;--ink:#F6E9EC;--muted:#C49AA4;--faint:#8A6670;--accent:#E14B6A;--accent2:#F07A92;--accentInk:#2A0E16;--card:#281720;--line:#3A2530;--tile:#321E29;--shadow:0 10px 30px rgba(0,0,0,.45);--r:18px}

body{margin:0;background:var(--bg);color:var(--ink);font-family:'Mulish',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px}

.top-in{display:flex;align-items:center;gap:12px;height:60px;max-width:1080px;margin:0 auto;padding:0 18px}
.mark{width:30px;height:30px;flex:0 0 auto}.mark svg{display:block;width:100%;height:100%}
.brandtext{font-family:'Lora',serif;font-weight:600;font-size:18px}
.brandtext small{display:block;font:500 11px 'Mulish';color:var(--muted);margin-top:-2px}
.top-sp{flex:1}
.topctrl{display:flex;align-items:center;gap:8px}
.ctrl{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);font:700 13px 'Mulish';cursor:pointer;display:grid;place-items:center;transition:.2s}
.ctrl:hover{border-color:var(--accent);color:var(--accent)}
.langwrap{position:relative}
.langmenu{position:absolute;top:46px;right:0;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:6px;min-width:184px;z-index:60}
.langmenu[hidden]{display:none}
.langopt{display:flex;gap:10px;align-items:center;width:100%;text-align:left;background:none;border:0;color:var(--ink);font:500 14px 'Mulish';padding:9px 12px;border-radius:9px;cursor:pointer;transition:.15s}
.langopt:hover{background:var(--tile)}
.langopt.on{color:var(--accent);font-weight:700}
.langopt .lc{width:26px;font-weight:700;color:var(--muted)}
.langopt.on .lc{color:var(--accent)}
.hero{padding:44px 0 22px}
.eyebrow{font:600 12px 'Mulish';letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin:0 0 14px}
.h1{font-family:'Lora',serif;font-weight:600;font-size:clamp(38px,7vw,66px);line-height:1.02;margin:0;letter-spacing:-.5px}
.sub{font-family:'Lora',serif;font-style:italic;font-size:clamp(17px,2.6vw,22px);color:var(--muted);margin:14px 0 0;max-width:42ch}
.by{margin-top:16px;font-size:13.5px;color:var(--muted)}.by b{color:var(--ink);font-weight:600}
#map{height:340px;border-radius:var(--r);margin:22px 0 8px;border:1px solid var(--line);z-index:1}
.pop-n{font-family:'Lora',serif;font-weight:600;font-size:15px;color:#1E1016}
.pop-r{color:#C13A57;font-weight:600;font-size:12.5px}.pop-note{font-style:italic;color:#7A5560;font-size:12.5px;margin-top:3px}
.st{font-family:'Lora',serif;font-weight:600;font-size:25px;margin:40px 0 4px}
.st small{display:block;font:400 13.5px 'Mulish';color:var(--muted);margin-top:4px}

.picker{display:flex;flex-wrap:wrap;gap:16px;margin:18px 0 6px;padding:16px;background:var(--tile);border:1px solid var(--line);border-radius:var(--r)}
.pgrp{display:flex;flex-direction:column;gap:7px}
.plab{font:600 11px 'Mulish';letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.popts{display:flex;gap:6px;flex-wrap:wrap}
.popt{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:6px 12px;font:500 13px 'Mulish';cursor:pointer;transition:.15s}
.popt.on{border-color:var(--accent);background:var(--accent);color:var(--accentInk)}
/* scenario */
.scn{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin:18px 0}
.scn.feat{border-color:var(--accent)}
.scn-h{padding:18px 20px 14px;border-bottom:1px solid var(--line)}
.scn-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.mtag{font:600 11.5px 'Mulish';background:var(--tile);border:1px solid var(--line);border-radius:999px;padding:4px 10px;color:var(--muted)}
.mtag.sun{color:var(--accent);border-color:var(--accent)}
.scn-t{font-family:'Lora',serif;font-weight:600;font-size:23px;margin:0;line-height:1.1}
.scn-why{font-family:'Lora',serif;font-style:italic;color:var(--muted);font-size:15px;margin:8px 0 0}
.scn-b{padding:6px 20px 18px}
.stop{display:flex;gap:13px;padding:12px 0;border-bottom:1px dashed var(--line)}.stop:last-child{border-bottom:0}
.stop-i{width:26px;height:26px;border-radius:50%;background:var(--accent);color:var(--accentInk);font:600 12px 'Mulish';display:grid;place-items:center;flex:0 0 auto;margin-top:1px}
.stop-n{font-weight:600;font-size:15px}.stop-m{color:var(--muted);font-weight:400;font-size:12.5px}
.stop-note{font-family:'Lora',serif;font-style:italic;font-size:13.5px;color:var(--muted);margin-top:2px}
.scn-x{display:grid;grid-template-columns:1fr;gap:12px;padding:14px 20px 18px;background:var(--tile);border-top:1px solid var(--line)}
@media(min-width:620px){.scn-x{grid-template-columns:1fr 1fr}}
.xblock{font-size:13px}.xblock h4{margin:0 0 4px;font:600 11px 'Mulish';letter-spacing:1px;text-transform:uppercase;color:var(--accent)}
.xblock ul{margin:0;padding-left:16px;color:var(--muted)}.xblock li{margin:2px 0}
.xblock p{margin:0;color:var(--muted)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .2s,border-color .2s;position:relative}

.ph{aspect-ratio:16/10;background:var(--tile) center/cover no-repeat;position:relative;display:grid;place-items:center}
.ph .ph-e{font-size:40px;opacity:.35}
.tag-dot{position:absolute;top:11px;left:11px;background:rgba(0,0,0,.55);color:#fff;border-radius:999px;padding:4px 10px;font:600 11.5px 'Mulish';display:inline-flex;gap:5px;align-items:center;backdrop-filter:blur(4px)}
.secret{position:absolute;top:11px;right:11px;background:var(--accent);color:var(--accentInk);border-radius:999px;padding:4px 10px;font:600 11px 'Mulish'}

.hours{font-size:12.5px;color:var(--muted)}
.note{font-family:'Lora',serif;font-style:italic;font-size:15px;line-height:1.4;color:var(--ink);border-left:2px solid var(--accent);padding-left:11px;margin:2px 0}
.cfoot{margin-top:auto;padding-top:6px}
.dir{display:inline-flex;align-items:center;gap:7px;color:var(--accent);font:600 13px 'Mulish';text-decoration:none}.dir:hover{text-decoration:underline}
.hidden{display:none!important}
.foot{border-top:1px solid var(--line);margin-top:50px;padding:34px 0 60px}
.cta{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:26px 24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.cta-t{font-family:'Lora',serif;font-weight:600;font-size:21px}.cta-t small{display:block;font:400 13.5px 'Mulish';color:var(--muted);margin-top:3px}
.btn{background:var(--accent);color:var(--accentInk);border:0;border-radius:12px;padding:12px 22px;font:600 14.5px 'Mulish';text-decoration:none;display:inline-block;cursor:pointer;transition:.2s}.btn:hover{filter:brightness(1.08)}
.sig{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:24px;font-size:12.5px;color:var(--muted)}.sig a{color:var(--muted)}
@keyframes markIn{0%{transform:translate(calc(50vw - 33px),40vh) scale(7);opacity:0}18%{opacity:1}70%{transform:translate(calc(50vw - 33px),40vh) scale(7)}100%{transform:translate(0,0) scale(1)}}
.mark.reveal{animation:markIn 2.4s cubic-bezier(.65,0,.25,1) both}@media(prefers-reduced-motion:reduce){.mark.reveal{animation:none}}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

 if(!o.size)o.add("food");return[...o];}

 });

 out.push({id:"multi",title:{ru:"Маршрут на 2–3 дня",en:"2–3 day route",pt:"Rota de 2–3 dias",es:"Ruta de 2–3 días",de:"2–3-Tage-Route"},

}

let L=detectLang(),active=null,filt={duration:null,car:null,light:null,act:null};

function t(k){return UI[L][k]}
function pick(v,l){return (v&&typeof v==='object')?(v[l]||v.ru||Object.values(v)[0]||''):(v||'')}
function raw(v){return pick(v,'ru')}
function tx(v){return pick(v,L)}
function fmtTime(d){return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0')}

/* i18n apply */
function applyI18n(){
 document.documentElement.lang=L;
 renderLangMenu();
 setBridges();
 document.querySelectorAll('[data-i]').forEach(el=>{const k=el.dataset.i;if(UI[L][k]!==undefined)el.textContent=UI[L][k];});
 document.title=t('title');
 const sec=GUIDE.points.filter(p=>p.secret).length;
 document.getElementById('by').innerHTML=t('by').replace('{a}','<b>'+GUIDE.meta.author+'</b>').replace('{n}',GUIDE.points.length).replace('{s}',sec);
 renderPicker();renderScenarios();renderTags();renderCards();
}

/* picker */
const DIMS=[
 {k:"duration",lab:"time",opts:[["half","half"],["day","day"],["multi","multi"]]},
 {k:"car",lab:"car",opts:[["true","cy"],["false","cn"]]},
 {k:"light",lab:"light",opts:[["sunset","sunset"],["sunrise","sunrise"],["day","dayl"]]},
 {k:"act",lab:"act",opts:[["walk","walk"],["hike","hike"],["food","food"]]}
];
function renderPicker(){
 document.getElementById('picker').innerHTML=DIMS.map(d=>`<div class="pgrp"><span class="plab">${t(d.lab)}</span>
  <div class="popts" data-k="${d.k}"><button class="popt ${filt[d.k]===null?'on':''}" data-v="">${t('any')}</button>
  ${d.opts.map(([v,lk])=>`<button class="popt ${String(filt[d.k])===v?'on':''}" data-v="${v}">${t(lk)}</button>`).join('')}</div></div>`).join('');
}
document.getElementById('picker').addEventListener('click',e=>{const b=e.target.closest('.popt');if(!b)return;
 const k=b.parentElement.dataset.k,v=b.dataset.v;
 filt[k]=v===""?null:(k==="car"?(v==="true"):v);
 renderPicker();renderScenarios();});

function scnMatch(s){
 if(filt.duration&&s.duration!==filt.duration)return false;
 if(filt.car!==null&&s.car!==filt.car)return false;
 if(filt.light&&s.light!=="any"&&s.light!==filt.light)return false;
 if(filt.act&&!(s.act||[]).includes(filt.act))return false;
 return true;
}
function sunLine(s){
 if(!s.sunLat)return"";
 const times=SunCalc.getTimes(new Date(),s.sunLat,s.sunLon);
 if(s.light==="sunset")return `<span class="mtag sun">🌅 ${t('sunset_t')} ${fmtTime(times.sunset)}</span>`;
 if(s.light==="sunrise")return `<span class="mtag sun">🌄 ${t('sunrise_t')} ${fmtTime(times.sunrise)}</span>`;
 return"";
}
function metaTags(s){
 const m=[];m.push(`<span class="mtag">⏱ ${t(s.duration)}</span>`);
 m.push(`<span class="mtag">🚗 ${s.car?t('cy'):t('cn')}</span>`);
 if(s.light&&s.light!=="any")m.push(`<span class="mtag">${s.light==="sunset"?"🌅":s.light==="sunrise"?"🌄":"☀️"} ${t(s.light==="day"?"dayl":s.light)}</span>`);
 (s.act||[]).forEach(a=>m.push(`<span class="mtag">${t(a)}</span>`));
 const sl=sunLine(s);if(sl)m.push(sl);
 return m.join('');
}
function renderScenarios(){
 const list=ALLSCN.filter(scnMatch);
 const box=document.getElementById('scns');
 if(!list.length){box.innerHTML=`<p style="color:var(--muted)">${t('noscn')}</p>`;return;}
 box.innerHTML=list.map(s=>{
  const title=s.title[L]||s.title.ru;
  let body;
  if(s.multiday){
   body=s.multiday.map(d=>`<div class="stop"><span class="stop-i">${d.day}</span><div>
     <div class="stop-n">${t('day')} ${d.day} · ${tx(d.t)}</div>
     <div class="stop-note">${d.pts.map(p=>p.name).join(' · ')}</div></div></div>`).join('');
  }else{
   body=s.stops.map((st,i)=>`<div class="stop"><span class="stop-i">${i+1}</span><div>
     <div class="stop-n">${tx(st.n)} ${st.m?`<span class="stop-m">· ${tx(st.m)}</span>`:''}</div>
     ${st.note?`<div class="stop-note">${tx(st.note)}</div>`:''}</div></div>`).join('');
  }
  let extra="";
  if(s.secrets||s.park||s.wear){
   extra=`<div class="scn-x">
    ${s.secrets?`<div class="xblock"><h4>🤫 ${t('secrets')}</h4><ul>${s.secrets.map(x=>`<li>${tx(x)}</li>`).join('')}</ul></div>`:''}
    <div class="xblock">
      ${s.park?`<h4>🅿 ${t('park')}</h4><p>${tx(s.park)}</p>`:''}
      ${s.wear?`<h4 style="margin-top:10px">👕 ${t('wear')}</h4><p>${tx(s.wear)}</p>`:''}
    </div></div>`;
  }
  return `<article class="scn ${s.feat?'feat':''}">
    <div class="scn-h"><div class="scn-meta">${metaTags(s)}</div>
      <h3 class="scn-t">${title}</h3>
      ${s.why?`<p class="scn-why">${tx(s.why)}</p>`:''}</div>
    <div class="scn-b">${body}</div>${extra}</article>`;
 }).join('');
}

/* tags + cards */
function renderTags(){
 const used=[...new Set(GUIDE.points.flatMap(p=>p.tags))];
 const box=document.getElementById('tags');
 box.innerHTML=`<button class="chip ${active===null?'on':''}" data-t="">${t('all')} <span class="ct">${GUIDE.points.length}</span></button>`+
  used.map(tg=>{const n=GUIDE.points.filter(p=>p.tags.includes(tg)).length;
   return `<button class="chip ${active===tg?'on':''}" data-t="${tg}">${TAGS[tg].e} ${TAGLABEL[L][tg]} <span class="ct">${n}</span></button>`}).join('');
}
document.getElementById('tags').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;active=b.dataset.t||null;renderTags();renderCards();drawMarkers();});
function visible(){return active?GUIDE.points.filter(p=>p.tags.includes(active)):GUIDE.points;}
function card(p){const tg=TAGS[p.tags[0]];
 const ph=p.photo?`style="background-image:url('${p.photo}')"`:"";
 return `<article class="card"><div class="ph" ${ph}>${p.photo?'':`<span class="ph-e">${tg.e}</span>`}
   <span class="tag-dot">${tg.e} ${TAGLABEL[L][p.tags[0]]}</span>
   ${p.secret?`<span class="secret">🤫 ${t('secret')}</span>`:''}</div>
  <div class="cbody"><h3 class="cname">${p.name}</h3>
   <div class="rate"><span class="star">★ ${p.rating.toFixed(1)}</span><span>${p.count.toLocaleString(L)} ${t('reviews')}</span><span>· ${p.addr}</span></div>
   <div class="hours">🕑 ${tx(p.hours)}</div>
   <p class="note">${tx(p.note).replace(/^[^:]+:\s*/,'')}</p>
   <div class="cfoot"><a class="dir" href="${p.dir}" target="_blank" rel="noopener">↗ ${t('dir')}</a></div>
  </div></article>`;}
function renderCards(){document.getElementById('grid').innerHTML=visible().map(card).join('');}

/* map */
let map,markers=[];
function initMap(){map=L_.map('map',{scrollWheelZoom:false}).setView([32.75,-17.05],10);
 L_.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);drawMarkers();}
function drawMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];const grp=[];
 visible().forEach(p=>{const tg=TAGS[p.tags[0]];
  const ic=L_.divIcon({className:'',html:`<div style="background:${tg.c};width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);display:grid;place-items:center"><span style="transform:rotate(45deg);font-size:12px">${p.secret?'🤫':tg.e}</span></div>`,iconSize:[26,26],iconAnchor:[13,26]});
  const m=L_.marker([p.lat,p.lon],{icon:ic}).addTo(map).bindPopup(`<div class="pop-n">${p.name}</div><div class="pop-r">★ ${p.rating} · ${p.count.toLocaleString(L)}</div><div class="pop-note">${tx(p.note).replace(/^[^:]+:\s*/,'')}</div>`);
  markers.push(m);grp.push([p.lat,p.lon]);});
 if(grp.length)map.fitBounds(grp,{padding:[40,40],maxZoom:11});}
const L_=window.L; // Leaflet (переменная L занята языком интерфейса)

/* footer links + controls */
function bridge(base){const p=new URLSearchParams();p.set('lang',L);const th=document.documentElement.dataset.theme;if(th)p.set('theme',th);return base+(base.includes('?')?'&':'?')+p.toString();}
function setBridges(){
  const hu=GUIDE.meta.hubUrl;
  const set=(id,u)=>{const el=document.getElementById(id);if(el)el.href=u;};
  set('hublink',bridge(hu));set('hub2',bridge(hu));set('lk',GUIDE.meta.linkedin);
}
/* язык — кнопка-кружок с кодом + выпадающее меню (§7.8) */
const LANGNAMES={ru:"Русский",en:"English",pt:"Português",es:"Español",de:"Deutsch"};
const langBtn=document.getElementById('langBtn'),langMenu=document.getElementById('langMenu');
function renderLangMenu(){
  langBtn.textContent=L.toUpperCase();
  langMenu.innerHTML=LANGS.map(c=>`<button class="langopt ${c===L?'on':''}" role="menuitem" data-l="${c}"><span class="lc">${c.toUpperCase()}</span>${LANGNAMES[c]}</button>`).join('');
}
function closeLangMenu(){langMenu.hidden=true;langBtn.setAttribute('aria-expanded','false');}
langBtn.addEventListener('click',e=>{e.stopPropagation();const willOpen=langMenu.hidden;langMenu.hidden=!willOpen;langBtn.setAttribute('aria-expanded',String(willOpen));});
langMenu.addEventListener('click',e=>{const b=e.target.closest('.langopt');if(!b)return;L=b.dataset.l;lsSet('guide_lang',L);applyI18n();closeLangMenu();});
document.addEventListener('click',e=>{if(!e.target.closest('.langwrap'))closeLangMenu();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLangMenu();});
const themeBtn=document.getElementById('theme');
(function initTheme(){
  const u=new URLSearchParams(location.search).get('theme');
  const s=lsGet('guide_theme');
  const th=(u==='light'||u==='')?u:(s!==null?s:'');
  if(th==='light')document.documentElement.dataset.theme='light';
  themeBtn.textContent=document.documentElement.dataset.theme==='light'?'☀':'☾';
})();
themeBtn.addEventListener('click',()=>{
  const cur=document.documentElement.dataset.theme==='light'?'':'light';
  if(cur)document.documentElement.dataset.theme=cur;else delete document.documentElement.dataset.theme;
  lsSet('guide_theme',cur);
  themeBtn.textContent=cur==='light'?'☀':'☾';
  setBridges();
  setTimeout(()=>{map&&map.invalidateSize()},60);
});

/* init */
applyI18n();initMap();
const mk=document.getElementById('mark');
if(!matchMedia('(prefers-reduced-motion:reduce)').matches){mk.classList.add('reveal');mk.addEventListener('animationend',()=>mk.classList.remove('reveal'),{once:true});}
</script>
</body>
</html>
