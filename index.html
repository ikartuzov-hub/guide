<style>
:root{--bg:#0E2233;--ink:#EAF1F4;--muted:#9DB2BF;--accent:#FF6B8A;--card:#16314A;--line:#244A66;--tile:#0A1A28;--shadow:0 10px 30px rgba(0,0,0,.35);--r:18px}
:root[data-theme="light"]{--bg:#F6F1E7;--ink:#16314A;--muted:#5C7384;--accent:#E14B6A;--card:#FFFFFF;--line:#E7DCC9;--tile:#EDE4D4;--shadow:0 10px 28px rgba(20,49,74,.10)}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px}
.top{position:sticky;top:0;z-index:1200;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.top-in{display:flex;align-items:center;gap:12px;height:60px;max-width:1080px;margin:0 auto;padding:0 18px}
.mark{width:30px;height:30px;flex:0 0 auto}.mark svg{display:block;width:100%;height:100%}
.brandtext{font-family:'Newsreader',serif;font-weight:600;font-size:18px}
.brandtext small{display:block;font:500 11px 'Inter';color:var(--muted);margin-top:-2px}
.top-sp{flex:1}
.lang{background:var(--tile);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:8px 10px;font:600 13px 'Inter';cursor:pointer}
.tbtn{background:none;border:1px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:11px;cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.2s}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.hero{padding:44px 0 22px}
.eyebrow{font:600 12px 'Inter';letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin:0 0 14px}
.h1{font-family:'Newsreader',serif;font-weight:600;font-size:clamp(38px,7vw,66px);line-height:1.02;margin:0;letter-spacing:-.5px}
.sub{font-family:'Newsreader',serif;font-style:italic;font-size:clamp(17px,2.6vw,22px);color:var(--muted);margin:14px 0 0;max-width:42ch}
.by{margin-top:16px;font-size:13.5px;color:var(--muted)}.by b{color:var(--ink);font-weight:600}
#map{height:340px;border-radius:var(--r);margin:22px 0 8px;border:1px solid var(--line);z-index:1}
.pop-n{font-family:'Newsreader',serif;font-weight:600;font-size:15px;color:#16314A}
.pop-r{color:#E14B6A;font-weight:600;font-size:12.5px}.pop-note{font-style:italic;color:#5C7384;font-size:12.5px;margin-top:3px}
.st{font-family:'Newsreader',serif;font-weight:600;font-size:25px;margin:40px 0 4px}
.st small{display:block;font:400 13.5px 'Inter';color:var(--muted);margin-top:4px}
/* picker */
.picker{display:flex;flex-wrap:wrap;gap:16px;margin:18px 0 6px;padding:16px;background:var(--tile);border:1px solid var(--line);border-radius:var(--r)}
.pgrp{display:flex;flex-direction:column;gap:7px}
.plab{font:600 11px 'Inter';letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.popts{display:flex;gap:6px;flex-wrap:wrap}
.popt{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:6px 12px;font:500 13px 'Inter';cursor:pointer;transition:.15s}
.popt.on{border-color:var(--accent);background:var(--accent);color:#fff}
/* scenario */
.scn{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin:18px 0}
.scn.feat{border-color:var(--accent)}
.scn-h{padding:18px 20px 14px;border-bottom:1px solid var(--line)}
.scn-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.mtag{font:600 11.5px 'Inter';background:var(--tile);border:1px solid var(--line);border-radius:999px;padding:4px 10px;color:var(--muted)}
.mtag.sun{color:var(--accent);border-color:var(--accent)}
.scn-t{font-family:'Newsreader',serif;font-weight:600;font-size:23px;margin:0;line-height:1.1}
.scn-why{font-family:'Newsreader',serif;font-style:italic;color:var(--muted);font-size:15px;margin:8px 0 0}
.scn-b{padding:6px 20px 18px}
.stop{display:flex;gap:13px;padding:12px 0;border-bottom:1px dashed var(--line)}.stop:last-child{border-bottom:0}
.stop-i{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font:600 12px 'Inter';display:grid;place-items:center;flex:0 0 auto;margin-top:1px}
.stop-n{font-weight:600;font-size:15px}.stop-m{color:var(--muted);font-weight:400;font-size:12.5px}
.stop-note{font-family:'Newsreader',serif;font-style:italic;font-size:13.5px;color:var(--muted);margin-top:2px}
.scn-x{display:grid;grid-template-columns:1fr;gap:12px;padding:14px 20px 18px;background:var(--tile);border-top:1px solid var(--line)}
@media(min-width:620px){.scn-x{grid-template-columns:1fr 1fr}}
.xblock{font-size:13px}.xblock h4{margin:0 0 4px;font:600 11px 'Inter';letter-spacing:1px;text-transform:uppercase;color:var(--accent)}
.xblock ul{margin:0;padding-left:16px;color:var(--muted)}.xblock li{margin:2px 0}
.xblock p{margin:0;color:var(--muted)}
/* tags + cards */
.tags{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 4px}
.chip{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:7px 13px;font:500 13px 'Inter';cursor:pointer;display:inline-flex;gap:6px;align-items:center;transition:.18s}
.chip.on{border-color:var(--accent);background:var(--accent);color:#fff}.chip .ct{opacity:.6;font-size:11px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;margin:20px 0 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .2s,border-color .2s;position:relative}
.card:hover{transform:translateY(-3px);border-color:var(--accent)}
.ph{aspect-ratio:16/10;background:var(--tile) center/cover no-repeat;position:relative;display:grid;place-items:center}
.ph .ph-e{font-size:40px;opacity:.35}
.tag-dot{position:absolute;top:11px;left:11px;background:rgba(0,0,0,.55);color:#fff;border-radius:999px;padding:4px 10px;font:600 11.5px 'Inter';display:inline-flex;gap:5px;align-items:center;backdrop-filter:blur(4px)}
.secret{position:absolute;top:11px;right:11px;background:var(--accent);color:#fff;border-radius:999px;padding:4px 10px;font:600 11px 'Inter'}
.cbody{padding:15px 16px 17px;display:flex;flex-direction:column;gap:9px;flex:1}
.cname{font-family:'Newsreader',serif;font-weight:600;font-size:19px;line-height:1.15;margin:0}
.rate{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);flex-wrap:wrap}.star{color:var(--accent);font-weight:700}
.hours{font-size:12.5px;color:var(--muted)}
.note{font-family:'Newsreader',serif;font-style:italic;font-size:15px;line-height:1.4;color:var(--ink);border-left:2px solid var(--accent);padding-left:11px;margin:2px 0}
.cfoot{margin-top:auto;padding-top:6px}
.dir{display:inline-flex;align-items:center;gap:7px;color:var(--accent);font:600 13px 'Inter';text-decoration:none}.dir:hover{text-decoration:underline}
.hidden{display:none!important}
.foot{border-top:1px solid var(--line);margin-top:50px;padding:34px 0 60px}
.cta{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:26px 24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.cta-t{font-family:'Newsreader',serif;font-weight:600;font-size:21px}.cta-t small{display:block;font:400 13.5px 'Inter';color:var(--muted);margin-top:3px}
.btn{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:12px 22px;font:600 14.5px 'Inter';text-decoration:none;display:inline-block;cursor:pointer;transition:.2s}.btn:hover{filter:brightness(1.08)}
.sig{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:24px;font-size:12.5px;color:var(--muted)}.sig a{color:var(--muted)}
@keyframes markIn{0%{transform:translate(calc(50vw - 33px),40vh) scale(7);opacity:0}18%{opacity:1}70%{transform:translate(calc(50vw - 33px),40vh) scale(7)}100%{transform:translate(0,0) scale(1)}}
.mark.reveal{animation:markIn 2.4s cubic-bezier(.65,0,.25,1) both}@media(prefers-reduced-motion:reduce){.mark.reveal{animation:none}}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media(max-width:560px){#map{height:280px}}
</style>
</head>

function deriveTags(p){const n=(p.note||"").toLowerCase();const o=new Set();
 if(/fine dining/.test(n))o.add("fine");if(/вино|винодел|погреб|дегустац/.test(n))o.add("wine");
 if(/кофе|ростер/.test(n))o.add("coffee");if(/пекарн|соурдоу/.test(n))o.add("bakery");
 if(/\bбар\b|понча|коктейл/.test(n))o.add("bar");if(/закат|рассвет|вид|панорам|водопад/.test(n))o.add("view");
 if(/левад|трек|хайк|тропа/.test(n))o.add("hike");if(/еда|кухн|ресторан|пицц|осьминог/.test(n)&&!o.has("fine"))o.add("food");
 if(!o.size)o.add("food");return[...o];}
function isSecret(p){const n=(p.note||"").toLowerCase();return p.count<600||/секрет|малоизвестн|без толп|только по записи|край света/.test(n);}
function regionOf(p){const{lat,lon}=p;if(lon<-17.18)return"west";if(lat>32.80)return"northwest";if(lat>32.78)return"north";if(lon>-16.88)return"east";if(lat<32.70&&lon>-16.97)return"funchal";return"centre";}
GUIDE.points.forEach(p=>{p.tags=deriveTags(p);p.secret=isSecret(p);p.reg=regionOf(p);
 p.dir=`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lon}&destination_place_id=${p.place_id}`;});

/* auto half-day scenarios from geo clusters (secret-led) */
const REGT={west:"Запад",northwest:"Северо-запад",north:"Север",east:"Восток",funchal:"Фуншал",centre:"Центр · горы"};
function autoScenarios(){
 const g={};GUIDE.points.forEach(p=>{(g[p.reg]=g[p.reg]||[]).push(p)});
 const out=[];
 Object.entries(g).forEach(([k,pts])=>{
  if(["west","centre","north","northwest"].includes(k))return; // покрыто ручными героями
  if(pts.length<2)return;
  pts.sort((a,b)=>(b.secret-a.secret)||(b.rating-a.rating));
  const light=k==="east"?"sunrise":(k==="funchal"?"day":"sunset");
  const car=k!=="funchal";
  out.push({id:"auto-"+k,title:{ru:"Полдня · "+REGT[k],en:"Half-day · "+REGT[k],pt:"Meio-dia · "+REGT[k],es:"Medio día · "+REGT[k],de:"Halber Tag · "+REGT[k]},
   duration:"half",car,light,act:[...new Set(pts.flatMap(p=>p.tags.map(t=>t==="view"?"walk":(t==="hike"?"hike":(t==="bar"||t==="wine"||t==="coffee"||t==="bakery"?"walk":"food")))))],
   why:"",auto:true,stops:pts.slice(0,4).map(p=>({n:p.name,m:"★"+p.rating+" · "+p.hours,note:p.note.replace(/^[^:]+:\s*/,'')})),sunLat:pts[0].lat,sunLon:pts[0].lon});
 });
 // multiday route (2–3 дня) by regions
 const order=["funchal","east","north","northwest","west","centre"].filter(k=>g[k]);
 out.push({id:"multi",title:{ru:"Маршрут на 2–3 дня",en:"2–3 day route",pt:"Rota de 2–3 dias",es:"Ruta de 2–3 días",de:"2–3-Tage-Route"},
  duration:"multi",car:true,light:"any",act:["walk","food","hike"],why:"",auto:true,multiday:order.map((k,i)=>({day:i+1,t:REGT[k],pts:g[k]})),sunLat:32.75,sunLon:-17.0});
 return out;
}

];

}

 const k=b.parentElement.dataset.k,v=b.dataset.v;
 filt[k]=v===""?null:(k==="car"?(v==="true"):v);
 renderPicker();renderScenarios();});

function scnMatch(s){
 if(filt.duration&&s.duration!==filt.duration)return false;
 if(filt.car!==null&&s.car!==filt.car)return false;
 if(filt.light&&s.light!=="any"&&s.light!==filt.light)return false;
 if(filt.act&&!(s.act||[]).includes(filt.act))return false;
 return true;
}
function sunLine(s){
 if(!s.sunLat)return"";
 const times=SunCalc.getTimes(new Date(),s.sunLat,s.sunLon);
 if(s.light==="sunset")return `<span class="mtag sun">🌅 ${t('sunset_t')} ${fmtTime(times.sunset)}</span>`;
 if(s.light==="sunrise")return `<span class="mtag sun">🌄 ${t('sunrise_t')} ${fmtTime(times.sunrise)}</span>`;
 return"";
}
function metaTags(s){
 const m=[];m.push(`<span class="mtag">⏱ ${t(s.duration)}</span>`);
 m.push(`<span class="mtag">🚗 ${s.car?t('cy'):t('cn')}</span>`);
 if(s.light&&s.light!=="any")m.push(`<span class="mtag">${s.light==="sunset"?"🌅":s.light==="sunrise"?"🌄":"☀️"} ${t(s.light==="day"?"dayl":s.light)}</span>`);
 (s.act||[]).forEach(a=>m.push(`<span class="mtag">${t(a)}</span>`));
 const sl=sunLine(s);if(sl)m.push(sl);
 return m.join('');
}
function renderScenarios(){
 const list=ALLSCN.filter(scnMatch);
 const box=document.getElementById('scns');
 if(!list.length){box.innerHTML=`<p style="color:var(--muted)">${t('noscn')}</p>`;return;}
 box.innerHTML=list.map(s=>{
  const title=s.title[L]||s.title.ru;
  let body;
  if(s.multiday){
   body=s.multiday.map(d=>`<div class="stop"><span class="stop-i">${d.day}</span><div>
     <div class="stop-n">${t('day')} ${d.day} · ${d.t}</div>
     <div class="stop-note">${d.pts.map(p=>p.name).join(' · ')}</div></div></div>`).join('');
  }else{
   body=s.stops.map((st,i)=>`<div class="stop"><span class="stop-i">${i+1}</span><div>
     <div class="stop-n">${st.n} ${st.m?`<span class="stop-m">· ${st.m}</span>`:''}</div>
     ${st.note?`<div class="stop-note">${st.note}</div>`:''}</div></div>`).join('');
  }
  let extra="";
  if(s.secrets||s.park||s.wear){
   extra=`<div class="scn-x">
    ${s.secrets?`<div class="xblock"><h4>🤫 ${t('secrets')}</h4><ul>${s.secrets.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:''}
    <div class="xblock">
      ${s.park?`<h4>🅿 ${t('park')}</h4><p>${s.park}</p>`:''}
      ${s.wear?`<h4 style="margin-top:10px">👕 ${t('wear')}</h4><p>${s.wear}</p>`:''}
    </div></div>`;
  }
  return `<article class="scn ${s.feat?'feat':''}">
    <div class="scn-h"><div class="scn-meta">${metaTags(s)}</div>
      <h3 class="scn-t">${title}</h3>
      ${s.why?`<p class="scn-why">${s.why}</p>`:''}</div>
    <div class="scn-b">${body}</div>${extra}</article>`;
 }).join('');
}

/* tags + cards */
function renderTags(){
 const used=[...new Set(GUIDE.points.flatMap(p=>p.tags))];
 const box=document.getElementById('tags');
 box.innerHTML=`<button class="chip ${active===null?'on':''}" data-t="">${t('all')} <span class="ct">${GUIDE.points.length}</span></button>`+
  used.map(tg=>{const n=GUIDE.points.filter(p=>p.tags.includes(tg)).length;
   return `<button class="chip ${active===tg?'on':''}" data-t="${tg}">${TAGS[tg].e} ${TAGLABEL[L][tg]} <span class="ct">${n}</span></button>`}).join('');
}
document.getElementById('tags').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;active=b.dataset.t||null;renderTags();renderCards();drawMarkers();});
function visible(){return active?GUIDE.points.filter(p=>p.tags.includes(active)):GUIDE.points;}
function card(p){const tg=TAGS[p.tags[0]];
 const ph=p.photo?`style="background-image:url('${p.photo}')"`:"";
 return `<article class="card"><div class="ph" ${ph}>${p.photo?'':`<span class="ph-e">${tg.e}</span>`}
   <span class="tag-dot">${tg.e} ${TAGLABEL[L][p.tags[0]]}</span>
   ${p.secret?`<span class="secret">🤫 ${t('secret')}</span>`:''}</div>
  <div class="cbody"><h3 class="cname">${p.name}</h3>
   <div class="rate"><span class="star">★ ${p.rating.toFixed(1)}</span><span>${p.count.toLocaleString('ru')} ${t('reviews')}</span><span>· ${p.addr}</span></div>
   <div class="hours">🕑 ${p.hours}</div>
   <p class="note">${p.note.replace(/^[^:]+:\s*/,'')}</p>
   <div class="cfoot"><a class="dir" href="${p.dir}" target="_blank" rel="noopener">↗ ${t('dir')}</a></div>
  </div></article>`;}
function renderCards(){document.getElementById('grid').innerHTML=visible().map(card).join('');}

/* map */
let map,markers=[];
function initMap(){map=L_.map('map',{scrollWheelZoom:false}).setView([32.75,-17.05],10);
 L_.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);drawMarkers();}
function drawMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];const grp=[];
 visible().forEach(p=>{const tg=TAGS[p.tags[0]];
  const ic=L_.divIcon({className:'',html:`<div style="background:${tg.c};width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);display:grid;place-items:center"><span style="transform:rotate(45deg);font-size:12px">${p.secret?'🤫':tg.e}</span></div>`,iconSize:[26,26],iconAnchor:[13,26]});
  const m=L_.marker([p.lat,p.lon],{icon:ic}).addTo(map).bindPopup(`<div class="pop-n">${p.name}</div><div class="pop-r">★ ${p.rating} · ${p.count.toLocaleString('ru')}</div><div class="pop-note">${p.note.replace(/^[^:]+:\s*/,'')}</div>`);
  markers.push(m);grp.push([p.lat,p.lon]);});
 if(grp.length)map.fitBounds(grp,{padding:[40,40],maxZoom:11});}
const L_=window.L; // Leaflet (переменная L занята языком интерфейса)

/* footer links + controls */
[['hublink',GUIDE.meta.hubUrl],['hub2',GUIDE.meta.hubUrl],['lk',GUIDE.meta.linkedin]].forEach(([id,u])=>document.getElementById(id).href=u);
document.getElementById('lang').addEventListener('change',e=>{L=e.target.value;applyI18n();});
const themeBtn=document.getElementById('theme');
themeBtn.addEventListener('click',()=>{const cur=document.documentElement.dataset.theme==='light'?'':'light';document.documentElement.dataset.theme=cur;themeBtn.textContent=cur==='light'?'☀':'☾';setTimeout(()=>{map&&map.invalidateSize()},60);});

/* init */
applyI18n();initMap();
const mk=document.getElementById('mark');
if(!matchMedia('(prefers-reduced-motion:reduce)').matches){mk.classList.add('reveal');mk.addEventListener('animationend',()=>mk.classList.remove('reveal'),{once:true});}
</script>
</body>
